<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasmin Beauty Salon</title>
</head>
<body>
    <header>
        <a href="index.html"><img src="assets/logo-test.png"
                        alt="Yasmin Beauty Salong Logo"
                        width="320">
        </a>
        <h1>Welcome to Yasmin Beauty Salon</h1>

        <nav class="globalNav">
            <select name="languages" id="language-toggle">
                <option value="EN">EN</option>
                <option value="ES">ES</option>
            </select>

            <button id="themeToggle">Should be theme toggle</button>
            
            <ul>
                <li><a href="about.html">About</a></li>
                <li><a href="#services">Services</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="map">
            <h2>Location</h2>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d52896.46063052753!2d-118.24379712089842!3d34.0431326!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80c2c60701da1d91%3A0x9e292fb128fbf175!2sYasmin%20Beauty%20Salon%20Unisex!5e0!3m2!1sen!2sus!4v1778407176796!5m2!1sen!2sus"
                        width="600" height="450" style="border:0;" 
                        allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

        <section id="appointments">
            <h2>Make an appointment</h2>
            <form action="">
                <label for="customerName">name</label>
                <input type="text" id="customerName"
                        name="name" placeholder="Your name">

                <label for="customerEmail">email</label>
                <input type="email" id="customerEmail"
                        name="email" placeholder="email@example.com"
                        pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">

                <label for="date">date</label>
                <input type="datetime-local" id="date"
                        name="date">

                <label for=""></label>

                <button type="submit">Book appointment</button>
            </form>
        </section>

        <section id="services">
            <p>seomthing hehhe</p>
        </section>
    </main>

    <footer>
        <p>Contact Us</p>
    </footer>


    
</body>
</html>
