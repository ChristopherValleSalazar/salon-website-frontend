<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasmin Beauty Salon</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="Yasmin Beauty Salon home">
            <img src="https://placehold.co/200x50?text=Yasmin+Beauty+Salon+Logo" alt="Yasmin Beauty Salon logo">
            <span>Yasmin Beauty Salon</span>
        </a>

        <span class="header-divider" aria-hidden="true"></span>

        <nav class="top-nav" aria-label="Primary">
            <ul class="nav-links">
                <li><a href="about.html">About</a></li>
                <li><a href="#services">Services</a></li>
            </ul>
        </nav>

        <div class="nav-controls">
            <button id="languageToggle" type="button" class="control-button" aria-label="Switch language">EN</button>
            <button id="themeToggle" type="button" class="control-button" aria-label="Toggle theme">Light mode</button>
        </div>
    </header>

    <main>
        <section class="content-grid" aria-label="Location and booking">
            <section id="map" class="panel">
                <h2>Location</h2>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d52896.46063052753!2d-118.24379712089842!3d34.0431326!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80c2c60701da1d91%3A0x9e292fb128fbf175!2sYasmin%20Beauty%20Salon%20Unisex!5e0!3m2!1sen!2sus!4v1778407176796!5m2!1sen!2sus"
                        width="300"
                        loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                        allowfullscreen title="Yasmin Beauty Salon location">
                </iframe>
            </section>

        <section id="appointments">
            <h2>Make an appointment</h2>
            <form action="">
                <label for="customerName">Name</label>
                <input type="text" id="customerName" required
                        name="name" placeholder="Your name">

                <label for="customerEmail">Email</label>
                <input type="email" id="customerEmail" required
                        name="email" placeholder="email@example.com"
                        pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">

                <label for="date">Date</label>
                <input type="datetime-local" id="date"
                        name="date">

                    <button class="bookAppointment" type="submit">Book appointment</button>
                </form>
            </section>
        </section>

        <div class="service-toggle">
            <button type="button" 
                    class="toggle-btn active"
                    data-target="services-beauty">
                Beauty Salon
            </button>

            <button type="button" 
                    class="toggle-btn"
                    data-target="services-barber">
                Barber Shop
            </button>
        </div>

        <section id="services-beauty" class="services-section is-open">
            <article class="service-card">
                
                <button type="button" class="service-header"
                        aria-expanded="false" aria-controls="service-1-BEAU-content">
                    
                    <div class="service-title-group">
                        <h2>Service 1 beau</h2>
                        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                        <p>FROM PRICE</p>
                    </div>

                    <span class="accordion-icon" aria-hidden="true">&#8964;</span>
                </button>

                <div id="service-1-BEAU-content" class="service-content is-closed">
                    <ul class="service-details">
                        <li>clock icon</li>
                        <li>duration</li>
                        <li>extras</li>
                    </ul>
                    <button type="button" class="appointment-booking">
                        Book this Service
                    </button>
                </div>
            </article>

            <article class="service-card">
                
                <button type="button" class="service-header"
                        aria-expanded="false" aria-controls="service-2-BEAU-content">
                    
                    <div class="service-title-group">
                        <h2>Service 2 beau</h2>
                        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                        <p>FROM PRICE</p>
                    </div>

                    <span class="accordion-icon" aria-hidden="true">&#8964;</span>
                </button>

                <div id="service-2-BEAU-content" class="service-content is-closed">
                    <ul class="service-details">
                        <li>clock icon</li>
                        <li>duration</li>
                        <li>extras</li>
                    </ul>
                    <button type="button" class="appointment-booking">
                        Book this Service
                    </button>
                </div>
            </article>
        </section>

        <section id="services-barber" class="services-section is-closed" >
            
            <article class="service-card">
                
                <button type="button" class="service-header"
                        aria-expanded="false" aria-controls="service-1-Bar-content">
                    
                    <div class="service-title-group">
                        <h2>Service 1 bar</h2>
                        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                        <p>FROM PRICE</p>
                    </div>

                    <span class="accordion-icon" aria-hidden="true">&#8964;</span>
                </button>

                <div id="service-1-Bar-content" class="service-content is-closed">
                    <ul class="service-details">
                        <li>clock icon</li>
                        <li>duration</li>
                        <li>extras</li>
                    </ul>
                    <button type="button" class="appointment-booking">
                        Book this Service
                    </button>
                
                </div>
            </article>

            <article class="service-card">
                
                <button type="button" class="service-header"
                        aria-expanded="false" aria-controls="service-2-Bar-content">
                    
                    <div class="service-title-group">
                        <h2>Service 1 bar</h2>
                        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                        <p>FROM PRICE</p>
                    </div>

                    <span class="accordion-icon">&#8964;</span>
                </button>

                <div id="service-2-Bar-content" class="service-content is-closed">
                    <ul class="service-details">
                        <li>clock icon</li>
                        <li>duration</li>
                        <li>extras</li>
                    </ul>
                    <button type="button" class="appointment-booking">
                        Book this Service
                    </button>
                
                </div>
            </article>
        </section>
    </main>

    <footer>
        <p>Contact Us</p>
        <ul>
            <li><a href="https://www.instagram.com/" target="_blank">Instagram</a></li>
            <li><a href="https://www.facebook.com/" target="_blank">Facebook</a></li>
        </ul>

        <p>© 2026 by Christopher Valle</p>
    </footer>
</body>
</html>
